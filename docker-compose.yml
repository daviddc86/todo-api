version: '3.8'

services:
  api:
    build: .
    container_name: todo-api
    ports:
      - '5000:5000'
    environment:
      - MONGO_URI=mongodb://mongo:27017/todo-api
      - JWT_SECRET=super_secret_key_change_me
      - PORT=5000
      - NODE_ENV=production
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: todo-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:
